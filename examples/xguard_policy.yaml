# XGuard Policy Configuration Example
# Save this as `xguard_policy.yaml` and pass to PolicyEngine
# 
# This example shows the fine-grained format where you directly specify
# thresholds for each model output category (e.g., "Cybersecurity-Hacker Attack").

policies:
  # Default policy - balanced security with fine-grained control
  default:
    input:
      thresholds:
        # Cybersecurity - strict threshold for hacking attempts
        Cybersecurity-Hacker Attack: 0.5
        Cybersecurity-Malicious Code: 0.6
        Cybersecurity-Access Control: 0.7
        Cybersecurity-Physical Security: 0.7
        # Data Privacy - protect personal information
        Data Privacy-Personal Privacy: 0.8
        Data Privacy-Commercial Secret: 0.8
        # Hate Speech - moderate sensitivity
        Hate Speech-Abusive Curses: 0.4
        Hate Speech-Defamation: 0.5
        Hate Speech-Threats and Intimidation: 0.4
        Hate Speech-Cyberbullying: 0.4
        # Crimes and Illegal Activities
        Crimes and Illegal Activities-Pornographic Contraband: 0.7
        Crimes and Illegal Activities-Drug Crimes: 0.7
        Crimes and Illegal Activities-Dangerous Weapons: 0.6
        Crimes and Illegal Activities-Property Infringement: 0.7
        Crimes and Illegal Activities-Economic Crimes: 0.7
        # Extremism
        Extremism-Violent Terrorist Activities: 0.5
        Extremism-Social Disruption: 0.6
        Extremism-Extremist Ideological Trends: 0.6
        # Physical and Mental Health
        Physical and Mental Health-Physical Health: 0.75
        Physical and Mental Health-Mental Health: 0.75
        # Ethics and Morality
        Ethics and Morality-Social Ethics: 0.75
        Ethics and Morality-Science Ethics: 0.75
        # Inappropriate Suggestions
        Inappropriate Suggestions-Finance: 0.75
        Inappropriate Suggestions-Medicine: 0.75
        Inappropriate Suggestions-Law: 0.75
        # Risks Involving Minors - very strict
        Risks Involving Minors-Corruption of Minors: 0.4
        Risks Involving Minors-Minor Abuse and Exploitation: 0.3
        Risks Involving Minors-Minor Delinquency: 0.5
        # Safe content threshold (low to allow safe content through)
        Safe-Safe: 0.7
      action: block
      fallback_message: "Your request cannot be processed due to safety concerns."
    output:
      thresholds:
        # Similar structure for output detection
        Cybersecurity-Hacker Attack: 0.5
        Data Privacy-Personal Privacy: 0.85
        Hate Speech-Abusive Curses: 0.5
        # ... add other categories as needed
      action: mask
    enable_context: true
    context_window: 5
    cache_enabled: true
    cache_ttl: 300

  # Strict policy - maximum security with fine-grained control
  strict:
    input:
      thresholds:
        # Lower thresholds = more sensitive detection
        Cybersecurity-Hacker Attack: 0.3
        Cybersecurity-Malicious Code: 0.4
        Data Privacy-Personal Privacy: 0.6
        Hate Speech-Abusive Curses: 0.3
        Hate Speech-Threats and Intimidation: 0.3
        Risks Involving Minors-Corruption of Minors: 0.2
        Risks Involving Minors-Minor Abuse and Exploitation: 0.2
        # ... configure all 25 categories with strict values
      action: block
      fallback_message: "This request violates our safety guidelines."
    output:
      thresholds:
        Cybersecurity-Hacker Attack: 0.3
        Data Privacy-Personal Privacy: 0.7
        # ... configure all categories
      action: block
    enable_context: true
    context_window: 10
    cache_enabled: true
    cache_ttl: 600

  # Lenient policy - minimal interference
  lenient:
    input:
      thresholds:
        # Higher thresholds = less sensitive detection
        Cybersecurity-Hacker Attack: 0.9
        Data Privacy-Personal Privacy: 0.95
        Hate Speech-Abusive Curses: 0.85
        # ... configure all categories with lenient values
      action: log_only
    output:
      thresholds:
        Cybersecurity-Hacker Attack: 0.9
        Data Privacy-Personal Privacy: 0.95
        # ... configure all categories
      action: log_only
    enable_context: false
    context_window: 0
    cache_enabled: true
    cache_ttl: 120

  # Customer service specific - mixed approach
  customer_service:
    input:
      thresholds:
        # Fine-grained control for specific risks
        Cybersecurity-Hacker Attack: 0.6
        Data Privacy-Personal Privacy: 0.9  # Allow customers to share some info
        Hate Speech-Abusive Curses: 0.5
        # Custom categories for business-specific needs
        competitor_mention: 0.8
        pricing_inquiry: 0.3  # Route to sales
      action: log_only
    output:
      thresholds:
        Data Privacy-Personal Privacy: 0.95  # Never leak customer data
        Inappropriate Suggestions-Finance: 0.8
        # Custom categories
        promise_making: 0.7  # Don't over-promise
      action: mask
    enable_context: true
    context_window: 8
    cache_enabled: true
    cache_ttl: 180

  # Code assistant specific
  code_assistant:
    input:
      thresholds:
        # Focus on cybersecurity risks
        Cybersecurity-Hacker Attack: 0.5
        Cybersecurity-Malicious Code: 0.5
        Cybersecurity-Access Control: 0.6
        Hate Speech-Abusive Curses: 0.7
        # Custom categories for code security
        malicious_code_request: 0.8
        vulnerability_exploit: 0.9
      action: block
      fallback_message: "I cannot help with potentially harmful code requests."
    output:
      thresholds:
        Inappropriate Suggestions-Law: 0.8
        # Custom categories for code quality
        hardcoded_secrets: 0.9
        insecure_patterns: 0.7
      action: mask
    enable_context: true
    context_window: 5
    cache_enabled: true
    cache_ttl: 300
